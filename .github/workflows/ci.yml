name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Python: design-spec package tests ---
  test-design-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install design-spec
        run: |
          cd packages/design-spec
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/design-spec
          pytest -v --cov=design_spec

  # --- Python: API tests ---
  test-api:
    runs-on: ubuntu-latest
    needs: test-design-spec
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: glicmack
          POSTGRES_PASSWORD: glicmack_dev
          POSTGRES_DB: glicmack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e packages/design-spec
          cd apps/api
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://glicmack:glicmack_dev@localhost:5432/glicmack_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd apps/api
          pytest -v

  # --- Python: Worker tests ---
  test-worker:
    runs-on: ubuntu-latest
    needs: test-design-spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e packages/design-spec
          cd apps/worker
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd apps/worker
          pytest -v

  # --- Asset provenance gate ---
  asset-provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check asset provenance registry
        run: |
          if [ -f templates/unity/asset_provenance.json ]; then
            python -c "
          import json, sys
          with open('templates/unity/asset_provenance.json') as f:
              registry = json.load(f)
          unknown = [k for k, v in registry.items() if v.get('status') in ('unknown', 'internal-only')]
          if unknown:
              print('ERROR: Non-redistributable assets found:')
              for a in unknown:
                  print(f'  - {a}: {registry[a][\"status\"]}')
              sys.exit(1)
          print('All assets have valid provenance tags.')
            "
          else
            echo "No asset provenance registry found (templates/unity/asset_provenance.json)"
            echo "This is expected if Unity template is not yet created."
          fi

  # --- Frontend: lint + type check ---
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            npm ci --ignore-scripts 2>/dev/null || echo "No package-lock.json yet"
          else
            echo "Frontend not scaffolded yet (apps/web/package.json missing). Skipping."
          fi
      - name: Lint + type check
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            npm run lint 2>/dev/null || echo "Lint not configured yet"
          else
            echo "Frontend not scaffolded yet. Skipping lint."
          fi
