[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glicmack-design-spec"
version = "0.1.0"
description = "Shared DesignSpec models, validators, and confidence scoring for Glicmack"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[tool.hatch.build.targets.wheel]
packages = ["src/design_spec"]

[tool.pytest.ini_options]
testpaths = ["tests"]
